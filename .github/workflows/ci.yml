name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  extension:
    name: Extension checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if extension package exists
        id: check
        run: |
          if [ -f packages/extension/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "packages/extension not found — skipping extension checks"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/extension/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci
        working-directory: packages/extension

      - name: Typecheck
        if: steps.check.outputs.exists == 'true'
        run: npm run typecheck
        working-directory: packages/extension

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: npm run build
        working-directory: packages/extension

      - name: Lint
        if: steps.check.outputs.exists == 'true'
        run: npm run lint
        working-directory: packages/extension

      - name: Test
        if: steps.check.outputs.exists == 'true'
        run: npm run test
        working-directory: packages/extension
