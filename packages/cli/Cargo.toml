[package]
name = "agentmark"
version = "0.1.0"
edition = "2021"

[lib]
name = "agentmark"
path = "src/lib.rs"

[[bin]]
name = "agentmark"
path = "src/main.rs"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
deunicode = "1"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
toml = "0.8"
ulid = "1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
